<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Integration Project </title>

    <!-- ── STYLESHEETS (one per module) ──────────────────────────── -->
  <link rel="stylesheet" href="css/base.css" />          <!-- foundation        -->
  <link rel="stylesheet" href="css/loader-error.css" />  <!-- loading & errors  -->
  <link rel="stylesheet" href="css/weather.css" />       <!-- weather section   -->
   <link rel="stylesheet" href="css/quotes.css" />        <!-- quotes section    -->
   
</head>
<body>
    
    <!--
  ┌─────────────────────────────────────────────────────────┐
  │  PAGE HEADER                                            │
  │  Brand name + tagline                                   │
  └─────────────────────────────────────────────────────────┘
  -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-dot"></span>
        <h1 class="brand-name">Pulse</h1>
      </div>
      <p class="brand-tagline">Live data from the web — weather, wisdom & GitHub.</p>
    </div>
  </header>

     <!--
  ┌─────────────────────────────────────────────────────────┐
  │  MAIN CONTENT  –  three API panels stacked vertically  │
  └─────────────────────────────────────────────────────────┘
  -->
  <main class="dashboard">
    <!-- ══════════════════════════════════════════════════════
         MODULE 1 — WEATHER PANEL
         Uses: Open-Meteo API (free, no key required)
         User types a city name → JS fetches coordinates
         from Nominatim → then fetches weather data
    ═══════════════════════════════════════════════════════ -->
    <section class="panel" id="weatherPanel" aria-label="Weather lookup">

      <div class="panel-header">
        <span class="panel-icon">🌤</span>
        <div>
          <h2 class="panel-title">Weather</h2>
          <p class="panel-desc">Current conditions for any city.</p>
        </div>
      </div>

      <!-- Search row: input + button -->
      <div class="search-row">
        <input
          type="text"
          id="cityInput"
          class="search-input"
          placeholder="Enter city name…"
          autocomplete="off"
        />
        <button class="search-btn" id="weatherBtn">
          Search
        </button>
      </div>

      <!-- Result area: filled by render.js -->
      <div class="panel-result" id="weatherResult">
        <p class="hint-text">Search a city to see live weather.</p>
      </div>
    </section>
   
    <!-- ══════════════════════════════════════════════════════
         MODULE 2 — QUOTE PANEL
         Uses: Quotable API (free, no key required)
         Each click fetches a new random inspiring quote
    ═══════════════════════════════════════════════════════ -->
    <section class="panel" id="quotePanel" aria-label="Random quote">

      <div class="panel-header">
        <span class="panel-icon">💬</span>
        <div>
          <h2 class="panel-title">Daily Wisdom</h2>
          <p class="panel-desc">A random quote fetched live from the web.</p>
        </div>
      </div>

      <!-- Result area: filled by render.js -->
      <div class="panel-result" id="quoteResult">
        <p class="hint-text">Press the button to get a quote.</p>
      </div>

      <button class="refresh-btn" id="quoteBtn">
        ↻ New Quote
      </button>

    </section>



    </main>

    
    <script src="js/render.js"></script>
    <script src="js/api.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
